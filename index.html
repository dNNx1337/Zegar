<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Tablica Gdynia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="dashboard">
        <div class="section-top">
            <div class="time-container">
                <div id="clock">--:--:--</div>
                <div id="date">Ładowanie daty...</div>
            </div>
            
            <div class="weather-container">
                <div id="location">📍 Gdynia, Wzgórze Św. Maksymiliana</div>
                <div id="weather">⏳ Pobieranie pogody...</div>
            </div>
        </div>

        <div class="section-bottom">
            <div class="transport-column">
                <h2>🚌 Witomino Centrum 04</h2>
                <div id="bus-data">⏳ Szukam autobusów...</div>
            </div>
            
            <div class="transport-column">
                <h2>🚆 SKM Wzgórze Św. Maksymiliana</h2>
                <div id="skm-data">⏳ Szukam pociągów...</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
